<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Service Man</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00b4db, #0083b0);
            color: #fff;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        .navbar {
            width: 250px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding: 15px;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .navbar h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .navbar a {
            color: #333;
            text-decoration: none;
            padding: 10px 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            background: linear-gradient(45deg, #ff6b6b, #f06595);
        }

        .navbar a:hover {
            background-color: #ddd;
            transform: translateX(5px);
        }

        .navbar a i {
            margin-right: 10px;
        }

        .navbar .logout {
            background-color: red;
            color: #fff;
        }

        .navbar .logout:hover {
            background-color: #d43f3a;
        }

        .logout-container {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .container {
            margin-left: 270px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        form {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        form h1 {
            color: #ff6b6b;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .form-group {
            position: relative;
            margin-bottom: 15px;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b6b;
            font-size: 1.2em; /* Adjust icon size if needed */
        }

        input[type="text"], input[type="password"], input[type="submit"] {
            width: 100%;
            padding: 12px;
            padding-left: 50px; /* Increased padding to prevent overlap */
            margin: 10px 0;
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1.2em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #f06595;
            box-shadow: 0 0 10px rgba(240, 101, 149, 0.5);
            outline: none;
        }

        input[type="submit"] {
            background: linear-gradient(45deg, #ff6b6b, #f06595);
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
            font-size: 1.2em;
            margin-top: 20px;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            text-transform: uppercase;
        }

        input[type="submit"]:hover {
            background-color: #f06595;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Admin Dashboard</h2>
        <a href="addCustomer.html">
            <i class="fas fa-user-plus"></i> Add Customer
        </a>
        <a href="viewCustomer.jsp">
            <i class="fas fa-users"></i> View Customer
        </a>
        <a href="addSman.html">
            <i class="fas fa-user-cog"></i> Add Service Man
        </a>
        <a href="viewSman.jsp">
            <i class="fas fa-users-cog"></i> View Service Man
        </a>
        <a href="viewUnsolvedComplaints.jsp">
            <i class="fas fa-exclamation-circle"></i> View Unsolved Complaints
        </a>
        <a href="viewsSolvedComplaints.jsp">
            <i class="fas fa-check-circle"></i> View Solved Complaints
        </a>
        <div class="logout-container">
            <a href="index.html" class="logout">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </div>
    <div class="container">
        <form action="AddSman" method="post">
            <h1>Add Service Man</h1>
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" name="name" placeholder="Enter Service Man Name" required>
            </div>
            <div class="form-group">
                <i class="fas fa-user-tie"></i>
                <input type="text" name="design" placeholder="Enter Designation" required>
            </div>
            <div class="form-group">
                <i class="fas fa-building"></i>
                <input type="text" name="depart" placeholder="Enter Department" required>
            </div>
            <div class="form-group">
                <i class="fas fa-map-pin"></i>
                <input type="text" name="pincode" placeholder="Enter Pincode" required>
            </div>
            <div class="form-group">
                <i class="fas fa-phone"></i>
                <input type="text" name="contact" placeholder="Enter Contact" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="text" name="email" placeholder="Enter Email" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
