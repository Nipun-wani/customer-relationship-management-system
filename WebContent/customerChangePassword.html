<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: linear-gradient(135deg, #89f7fe, #66a6ff); /* Soft gradient background */
        }

        .navbar {
            width: 250px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding: 15px;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .navbar h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            background: linear-gradient(45deg, #ff6b6b, #f06595);
        }

        .navbar a:hover {
            background-color: #ddd;
            transform: translateX(5px);
        }

        .navbar a i {
            margin-right: 10px;
        }

        .navbar .logout {
            background-color: red;
            color: #fff;
        }

        .navbar .logout:hover {
            background-color: #d43f3a;
        }

        .logout-container {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .main-content {
            margin-left: 250px; /* Adjusted margin to accommodate the fixed navbar */
            display: flex;
            justify-content: center;
            align-items: center;
            width: calc(100% - 250px);
        }

        form {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h1 {
            color: #ff6b6b; /* Matching the color used in navbar options */
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        input[type="text"], input[type="password"], input[type="submit"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin: 10px auto;
            border: 2px solid #ff6b6b; /* Matching the color used in navbar options */
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1.2em;
            transition: border-color 0.3s, box-shadow 0.3s;
            display: block;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #d43f3a;
            box-shadow: 0 0 10px rgba(212, 63, 58, 0.5);
            outline: none;
        }

        input[type="submit"] {
            background-color: #d43f3a; /* Darker shade of the gradient */
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
            font-size: 1.2em;
            margin-top: 20px;
            padding: 10px 15px; /* Adjusted padding */
            border: none;
            border-radius: 10px;
            text-transform: uppercase;
            width: 100%;
            display: block;
        }

        input[type="submit"]:hover {
            background-color: #ff6b6b; /* Lighter shade on hover */
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            form {
                width: 90%; /* Responsive width */
                padding: 20px; /* Adjusted padding on smaller screens */
            }
            .navbar {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Customer Dashboard</h2>
        <a href="addComplaints.html">
            <i class="fas fa-plus-circle"></i> Add Complaints
        </a>
        <a href="customerUnsolvedComplaints.jsp">
            <i class="fas fa-exclamation-circle"></i> View Unsolved Complaints
        </a>
        <a href="customerSolvedComplaints.jsp">
            <i class="fas fa-check-circle"></i> View Solved Complaints
        </a>
        <a href="customerChangePassword.html">
            <i class="fas fa-key"></i> Change Password
        </a>
        <div class="logout-container">
            <a href="index.html" class="logout">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </div>
    <div class="main-content">
        <form action="CoustomerChangePass" method="post">
            <h1>Change Password</h1>
            <input type="text" name="email" placeholder="Enter Email" required>
            <input type="password" name="password" placeholder="Enter new password" required>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
