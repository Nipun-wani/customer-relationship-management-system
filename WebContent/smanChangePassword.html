
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Man Change Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            margin: 0;
            background: linear-gradient(to right, #00b4db, #0083b0);
            color: #fff;
        }

        .navbar {
            width: 250px;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding: 15px;
            height: 100vh;
            position: fixed;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .navbar h2 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .navbar a {
            color: #333;
            text-decoration: none;
            padding: 10px 15px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            background: linear-gradient(45deg, #ff6b6b, #f06595);
        }

        .navbar a:hover {
            background-color: #ddd;
            transform: translateX(5px);
        }

        .navbar a i {
            margin-right: 10px;
        }

        .navbar .logout {
            background-color: red;
            color: #fff;
        }

        .navbar .logout:hover {
            background-color: #d43f3a;
        }

        .logout-container {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .container {
            margin-left: 270px;
            padding: 150px;
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        form {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
            width: 400px;
        }

        h1 {
            color: #ff6b6b;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        input[type="text"], input[type="password"] {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: calc(100% - 22px);
            font-size: 1.2em;
            transition: border-color 0.3s;
        }

        input[type="submit"] {
            padding: 10px;
            margin-top: 15px;
            background-color: #ff6b6b; /* Color matching navbar */
            color: white;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            width: 100%;
        }

        input[type="submit"]:hover {
            background-color: #f06595; /* Lighter shade of the button color */
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        input[type="submit"]:active {
            background-color: #d9534f;
        }

        /* Additional styling for responsiveness */
        @media (max-width: 480px) {
            form {
                width: 90%; /* Responsive width */
            }

            h1 {
                font-size: 2em; /* Adjust font size */
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Service Man Dashboard</h2>
        <a href="viewSmanUnsolvedComplaints.jsp">
            <i class="fas fa-exclamation-circle"></i> View Own Unsolved Complaints
        </a>
        <a href="viewSmanSolvedComplaints.jsp">
            <i class="fas fa-check-circle"></i> View Solved Complaints
        </a>
        <a href="smanChangePassword.html">
            <i class="fas fa-key"></i> Change Password
        </a>
        <div class="logout-container">
            <a href="index.html" class="logout">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </a>
        </div>
    </div>
    <div class="container">
        <form action="SmanChangePassword" method="post">
            <h1>Change Password</h1>
            <input type="text" name="email" placeholder="Enter Email" required>
            <br><br>
            <input type="password" name="password" placeholder="Enter New Password" required>
            <br><br>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
